services:
  postgres:
    image: postgres:16-alpine
    container_name: train-booking-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: trainbooking
      POSTGRES_PASSWORD: trainbooking
      POSTGRES_DB: trainbooking
    ports:
      - "5432:5432"
    volumes:
      - train_booking_pgdata:/var/lib/postgresql/data

volumes:
  train_booking_pgdata: